version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: OrderFlowX
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Dilip@1586
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  discovery-service:
    build: ./discovery-service
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service

  user-service:
    build: ./user-service
    depends_on:
      - discovery-service
      - postgres

  inventory-service:
    build: ./inventory-service
    depends_on:
      - discovery-service
      - postgres

  order-service:
    build: ./order-service
    depends_on:
      - discovery-service
      - postgres
      - kafka

  payment-service:
    build: ./payment-service
    depends_on:
      - discovery-service
      - postgres
      - kafka

volumes:
  postgres_data: